<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Function Plane — Main + Packs</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #e8e8e3; font-family: 'Geist', system-ui, sans-serif; }
  [data-theme="dark"] body, body.dark-host { background: #0a0a0b; }
  .stage {
    width: 100%; min-height: 100vh; display: flex; align-items: flex-start;
    justify-content: center; padding: 32px 16px; box-sizing: border-box;
    background: var(--host-bg, #e8e8e3);
    transition: background .25s ease;
  }
  .col { display: flex; gap: 32px; flex-wrap: wrap; align-items: flex-start; justify-content: center; }
  .label {
    text-align: center; margin-top: 14px;
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: #8a8a85; font-weight: 500;
  }
  .frame-wrap { display: flex; flex-direction: column; align-items: center; }

  /* Logo showcase */
  .logo-show {
    display: flex; flex-direction: column; align-items: center; gap: 18px;
    padding: 22px;
    align-self: stretch;
    min-width: 240px;
  }
  .logo-row { display: flex; align-items: flex-end; gap: 18px; }
  .logo-cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .logo-cell .sz {
    font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase;
    color: #8a8a85; font-family: ui-monospace, 'Geist Mono', monospace;
  }
  .logo-springboard {
    width: 240px; padding: 14px; border-radius: 16px;
    background: var(--springboard-bg, rgba(0,0,0,0.04));
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px 10px;
    justify-items: center;
  }
  .logo-app { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .logo-app .nm {
    font-size: 9.5px; color: var(--springboard-ink, #2c2c28);
    text-align: center; max-width: 50px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  [data-stage-dark] .logo-springboard {
    --springboard-bg: rgba(255,255,255,0.04);
    --springboard-ink: #d8d8d2;
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="ui-kit.jsx"></script>
  <script type="text/babel" src="app-logo.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="main-screen.jsx"></script>
  <script type="text/babel" src="pack-selector.jsx"></script>
  <script type="text/babel" src="level-selector.jsx"></script>
  <script type="text/babel" src="level-complete.jsx"></script>
  <script type="text/babel" src="level-screen.jsx"></script>
  <script type="text/babel" src="achievements-screen.jsx"></script>
  <script type="text/babel" src="how-to-play-screen.jsx"></script>
  <script type="text/babel" src="settings-account.jsx"></script>

  <script type="text/babel" data-presets="env,react">
  const { useState, useEffect, useMemo } = React;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "dark",
    "density": "comfortable",
    "progress": "mid",
    "view": "single"
  }/*EDITMODE-END*/;

  function App() {
    const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
    const dark = tweaks.theme === 'dark';

    // Sync host background to theme
    useEffect(() => {
      document.documentElement.style.setProperty('--host-bg', dark ? '#0a0a0b' : '#e8e8e3');
    }, [dark]);

    const progress = useMemo(() => buildProgress(tweaks.progress), [tweaks.progress]);
    const totalStars = useMemo(() => totalStarsAll(progress), [progress]);

    // Per-frame nav state — { route: 'main'|'packs'|'levels', pack: object|null }
    const [navA, setNavA] = useState({ route: 'main', pack: null });
    const [navB, setNavB] = useState({ route: 'packs', pack: null });
    const [navSingle, setNavSingle] = useState({ route: 'main', pack: null });
    const [completed, setCompleted] = useState(null); // { score, stars, prevBest, isNewBest } | null

    const finishCurrent = () => {
      const nav = tweaks.view === 'both' ? navA : navSingle;
      if (nav.route !== 'level') {
        alert('Open a level first to use Finish.');
        return;
      }
      const li = nav.levelIndex || 0;
      const prevBest = progress?.[nav.pack.id]?.best?.[li] ?? null;
      const score = 180 + Math.floor(Math.random() * 60);
      const stars = score < 220 ? 3 : score < 280 ? 2 : 1;
      setCompleted({
        score, stars, prevBest,
        isNewBest: prevBest == null || score < prevBest,
      });
    };

    const screenFor = (which, nav, setNav) => {
      if (nav.route === 'main') {
        return (
          <MainScreen
            totalStars={totalStars}
            onPlay={() => setNav({ route: 'packs', pack: null })}
            onInfo={() => setNav({ route: 'how-to-play', pack: null })}
            onAchievements={() => setNav({ route: 'achievements', pack: null })}
            onAccount={() => setNav({ route: 'account', pack: null })}
            onSettings={() => setNav({ route: 'settings', pack: null })}
            density={tweaks.density}
          />
        );
      }
      if (nav.route === 'packs') {
        return (
          <PackSelector
            progress={progress}
            density={tweaks.density}
            onBack={() => setNav({ route: 'main', pack: null })}
            onPickPack={(p) => setNav({ route: 'levels', pack: p })}
          />
        );
      }
      if (nav.route === 'levels') {
        return (
          <LevelSelector
            pack={nav.pack}
            progress={progress}
            density={tweaks.density}
            onBack={() => setNav({ route: 'packs', pack: null })}
            onPickLevel={(p, i) => { setCompleted(null); setNav({ route: 'level', pack: p, levelIndex: i }); }}
          />
        );
      }
      if (nav.route === 'achievements') {
        return (
          <AchievementsScreen
            progress={progress}
            density={tweaks.density}
            onBack={() => setNav({ route: 'main', pack: null })}
          />
        );
      }
      if (nav.route === 'how-to-play') {
        return (
          <HowToPlayScreen
            density={tweaks.density}
            onBack={() => setNav({ route: 'main', pack: null })}
            onStart={() => setNav({ route: 'packs', pack: null })}
          />
        );
      }
      if (nav.route === 'settings') {
        return (
          <SettingsScreen
            density={tweaks.density}
            tweaks={tweaks}
            setTweak={setTweak}
            onBack={() => setNav({ route: 'main', pack: null })}
          />
        );
      }
      if (nav.route === 'account') {
        return (
          <AccountScreen
            density={tweaks.density}
            totalStars={totalStars}
            onBack={() => setNav({ route: 'main', pack: null })}
          />
        );
      }
      return (
        <LevelScreen
          pack={nav.pack}
          levelIndex={nav.levelIndex || 0}
          progress={progress}
          density={tweaks.density}
          onBack={() => { setCompleted(null); setNav({ route: 'levels', pack: nav.pack }); }}
          completed={completed}
          onCloseComplete={() => setCompleted(null)}
          onReplay={() => setCompleted(null)}
          onNextLevel={() => {
            setCompleted(null);
            const next = (nav.levelIndex || 0) + 1;
            if (next < 10) setNav({ route: 'level', pack: nav.pack, levelIndex: next });
            else setNav({ route: 'levels', pack: nav.pack });
          }}
        />
      );
    };

    const labelFor = (r) => ({
      'main': '01 Main', 'packs': '02 Packs', 'levels': '03 Levels',
      'level': '04 Level', 'achievements': '05 Achievements',
      'how-to-play': '06 How to play', 'settings': '07 Settings', 'account': '08 Account',
    })[r] || r;
    const titleFor = (r) => ({
      'main': 'Main Screen', 'packs': 'Pack Selector', 'levels': 'Level Selector',
      'level': 'Level', 'achievements': 'Achievements',
      'how-to-play': 'How to Play', 'settings': 'Settings', 'account': 'Account',
    })[r] || r;

    const Frame = ({ label, nav, setNav }) => (
      <div className="frame-wrap" data-screen-label={labelFor(nav.route)}>
        <IOSDevice width={402} height={874} dark={dark}>
          <div data-theme={dark ? 'dark' : 'light'} data-density={tweaks.density}
            style={{ width: '100%', height: '100%' }}>
            {screenFor(label, nav, setNav)}
          </div>
        </IOSDevice>
        <div className="label">{label}</div>
      </div>
    );

    const LogoShowcase = ({ dark }) => (
      <div className="frame-wrap" data-screen-label="00 Logo">
        <div className="logo-show" data-stage-dark={dark ? '' : undefined}>
          {/* Hero */}
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 14 }}>
            <AppLogo size={160} />
            <div style={{
              fontFamily: "'Instrument Serif', Georgia, serif", fontStyle: 'italic',
              fontSize: 22, letterSpacing: '-0.02em',
              color: dark ? '#f3f3ef' : '#0e0f10',
              display: 'inline-flex', gap: 6,
            }}>
              <span>Function</span>
              <span style={{ fontStyle: 'normal', opacity: 0.5 }}>Plane</span>
            </div>
          </div>

          {/* Size scale */}
          <div className="logo-row">
            <div className="logo-cell"><AppLogo size={88}/><div className="sz">88px</div></div>
            <div className="logo-cell"><AppLogo size={56}/><div className="sz">56px</div></div>
            <div className="logo-cell"><AppLogo size={32}/><div className="sz">32px</div></div>
            <div className="logo-cell"><AppLogo size={20}/><div className="sz">20px</div></div>
          </div>

          {/* Springboard mock */}
          <div className="logo-springboard">
            <div className="logo-app"><AppLogo size={48}/><div className="nm">Function Plane</div></div>
            <div className="logo-app">
              <div style={{ width: 48, height: 48, borderRadius: 11, background: dark ? '#23262a' : '#dadad3' }}/>
              <div className="nm">Photos</div>
            </div>
            <div className="logo-app">
              <div style={{ width: 48, height: 48, borderRadius: 11, background: dark ? '#23262a' : '#dadad3' }}/>
              <div className="nm">Mail</div>
            </div>
            <div className="logo-app">
              <div style={{ width: 48, height: 48, borderRadius: 11, background: dark ? '#23262a' : '#dadad3' }}/>
              <div className="nm">Music</div>
            </div>
          </div>
        </div>
        <div className="label">App Logo</div>
      </div>
    );

    return (
      <div className="stage">
        {tweaks.view === 'both' ? (
          <div className="col">
            <LogoShowcase dark={dark}/>
            <Frame label="Main Screen" nav={navA} setNav={setNavA} />
            <Frame label="Pack Selector" nav={navB} setNav={setNavB} />
          </div>
        ) : (
          <div className="col">
            <LogoShowcase dark={dark}/>
            <Frame label={titleFor(navSingle.route)}
              nav={navSingle} setNav={setNavSingle} />
          </div>
        )}

        <TweaksPanel title="Tweaks" defaultPosition={{ right: 20, top: 20 }}>
          <TweakSection title="Appearance">
            <TweakRadio label="Theme" value={tweaks.theme}
              options={[{ value: 'light', label: 'Light' }, { value: 'dark', label: 'Dark' }]}
              onChange={(v) => setTweak('theme', v)} />
            <TweakRadio label="Density" value={tweaks.density}
              options={[{ value: 'compact', label: 'Compact' }, { value: 'comfortable', label: 'Comfort' }]}
              onChange={(v) => setTweak('density', v)} />
          </TweakSection>
          <TweakSection title="Content">
            <TweakSelect label="Progress" value={tweaks.progress}
              options={[
                { value: 'fresh', label: 'Fresh account' },
                { value: 'mid',   label: 'Mid-progress' },
                { value: 'power', label: 'Power user' },
              ]}
              onChange={(v) => setTweak('progress', v)} />
          </TweakSection>
          <TweakSection title="Layout">
            <TweakRadio label="View" value={tweaks.view}
              options={[{ value: 'both', label: 'Both' }, { value: 'single', label: 'Single' }]}
              onChange={(v) => setTweak('view', v)} />
          </TweakSection>
          <TweakSection title="Debug">
            <TweakButton onClick={finishCurrent}>Finish current level</TweakButton>
          </TweakSection>
        </TweaksPanel>
      </div>
    );
  }

  // Mount when scripts have loaded
  function mount() {
    if (typeof MainScreen === 'undefined' || typeof PackSelector === 'undefined' || typeof LevelSelector === 'undefined' || typeof LevelScreen === 'undefined' || typeof LevelCompletePopup === 'undefined' || typeof AchievementsScreen === 'undefined' || typeof HowToPlayScreen === 'undefined' || typeof SettingsScreen === 'undefined' || typeof AccountScreen === 'undefined' || typeof AppLogo === 'undefined' || typeof useTweaks === 'undefined') {
      return setTimeout(mount, 30);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  }
  mount();
  </script>
</body>
</html>
