<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Function Plane" />
  <meta name="theme-color" content="#0e0f10" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <title>Function Plane</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="src/styles.css" />

  <style>
    html {
      height: 100%;
      /* Prevent double-tap zoom on mobile */
      touch-action: manipulation;
    }

    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0e0f10;
    }

    #root {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    /* Desktop / large tablet: show as a centered phone */
    @media (min-width: 520px) {
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #111213;
        height: 100vh;
        overflow: hidden;
      }

      #root {
        width: 390px;
        height: min(844px, 100vh);
        height: min(844px, 100dvh);
        border-radius: 44px;
        overflow: hidden;
        flex-shrink: 0;
        box-shadow:
          0 0 0 1px rgba(255,255,255,0.08),
          0 40px 80px rgba(0,0,0,0.55),
          0 8px 24px rgba(0,0,0,0.4);
      }
    }

    /* ── Splash / loading screen ──────────────────────────────────────────
       Painted before any JavaScript runs (HTML+CSS only) so the user sees
       the wordmark instantly. JS hides it once both React and the Google
       Fonts (Instrument Serif + Geist) have finished loading. */
    #fp-splash {
      position: fixed; inset: 0; z-index: 99999;
      background: #0e0f10;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      /* Held invisible for the first 500ms so a fast boot shows nothing at
         all; the JS below either reveals it (slow boot) or skips it. */
      opacity: 0;
      transition: opacity .3s ease;
      /* Use a system serif up front; the wordmark restyles itself once
         Instrument Serif has loaded. Most platforms render Georgia in italic
         close enough that the swap is barely perceptible. */
      font-family: Georgia, 'Times New Roman', serif;
    }
    #fp-splash.fp-show { opacity: 1; }
    #fp-splash.fp-fade { opacity: 0; pointer-events: none; }
    #fp-splash .fp-wordmark {
      font-style: italic; font-weight: 400;
      font-size: 56px; line-height: 1; letter-spacing: -0.02em;
      color: #f4f4f5;
    }
    #fp-splash .fp-wordmark .accent { color: #c0c0c4; }
    #fp-splash .fp-tag {
      margin-top: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
      color: #6b6c70;
    }
    #fp-splash .fp-bar {
      margin-top: 28px;
      width: 80px; height: 2px; border-radius: 2px;
      background: #1c1d20;
      overflow: hidden;
    }
    #fp-splash .fp-bar::after {
      content: ''; display: block;
      width: 40%; height: 100%;
      background: #6b6c70;
      animation: fp-pulse 1.1s ease-in-out infinite;
    }
    @keyframes fp-pulse {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(250%); }
    }
    /* When Instrument Serif loaded, the wordmark switches to it cleanly */
    .fonts-ready #fp-splash .fp-wordmark {
      font-family: 'Instrument Serif', Georgia, 'Times New Roman', serif;
    }
  </style>
</head>
<body>
  <div id="fp-splash" aria-hidden="true">
    <div class="fp-wordmark"><span>Function</span> <span class="accent">Plane</span></div>
    <div class="fp-tag">loading</div>
    <div class="fp-bar"></div>
  </div>
  <div id="root"></div>

  <!-- Vendor scripts bundled locally so the WebView (Capacitor on Android/iOS)
       can boot without any network round-trips. CDNs were unreliable inside
       the WebView, and runtime Babel (`<script type="text/babel" src=...>`)
       silently fails on Android because Babel-standalone XHR-fetches and
       eval's each JSX file. Instead, JSX is pre-compiled to .js by
       scripts/build-jsx.js — re-run that after editing any .jsx file. -->
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>

  <!-- Supabase JS client (loaded before accounts.js so FP_AUTH can init) -->
  <script src="vendor/supabase.js"></script>
  <script src="src/supabase-config.js"></script>
  <script src="src/premium-config.js"></script>

  <script src="src/physics-config.js"></script>
  <script src="src/audio.js"></script>
  <script src="src/accounts.js"></script>
  <script src="src/ui-kit.js"></script>
  <script src="src/app-logo.js"></script>
  <script src="src/data.js"></script>
  <script src="src/main-screen.js"></script>
  <script src="src/pack-selector.js"></script>
  <script src="src/level-selector.js"></script>
  <script src="src/settings-screen.js"></script>
  <script src="src/keyboard.js"></script>
  <script src="src/level-screen.js"></script>
  <script src="src/level-complete.js"></script>
  <script src="src/how-to-play.js"></script>
  <script src="src/achievements.js"></script>
  <script src="src/account-screen.js"></script>
  <script src="src/admin-screen.js"></script>
  <script src="src/legal-screens.js"></script>
  <script src="src/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }

    // ── Splash dismissal ────────────────────────────────────────────────
    // Hide the splash only when:
    //   1. The Google Fonts we depend on have actually loaded
    //   2. The first React tree is in the DOM (#root has children)
    // This avoids the 1-frame flash where serif text appears in Georgia
    // before swapping to Instrument Serif.
    (function () {
      var splash = document.getElementById('fp-splash');
      if (!splash) return;
      var revealDelay = 500;     // wait this long before showing the splash
      var minVisible  = 350;     // once shown, don't blink it out instantly
      var done = false;
      var revealedAt = 0;

      var revealTimer = setTimeout(function () {
        if (done) return;
        splash.classList.add('fp-show');
        revealedAt = Date.now();
      }, revealDelay);

      function fontsReady() {
        if (!document.fonts || !document.fonts.load) return Promise.resolve();
        return Promise.allSettled([
          document.fonts.load('italic 1em "Instrument Serif"'),
          document.fonts.load('500 1em "Geist"'),
          document.fonts.load('400 1em "Geist Mono"'),
        ]).then(function () {
          document.documentElement.classList.add('fonts-ready');
        });
      }
      function rootReady() {
        return new Promise(function (resolve) {
          var root = document.getElementById('root');
          if (root && root.firstChild) return resolve();
          var mo = new MutationObserver(function () {
            if (root.firstChild) { mo.disconnect(); resolve(); }
          });
          mo.observe(root, { childList: true });
        });
      }
      function hide() {
        if (done) return;
        done = true;
        clearTimeout(revealTimer);
        // If the splash was never revealed (fast boot), just remove it.
        if (!splash.classList.contains('fp-show')) {
          splash.remove();
          return;
        }
        var visibleFor = Date.now() - revealedAt;
        var wait = Math.max(0, minVisible - visibleFor);
        setTimeout(function () {
          splash.classList.add('fp-fade');
          setTimeout(function () { splash.remove(); }, 320);
        }, wait);
      }
      Promise.all([fontsReady(), rootReady()]).then(hide).catch(hide);
      // Hard fallback so a slow network never strands the user on the splash
      setTimeout(hide, 7000);
    })();
  </script>
</body>
</html>
